name: QA Automation CI

on:
  push:
    branches: ["main", "demo-static-analysis-ci"]
  pull_request:
    branches: ["main"]

jobs:
  quality-checks:
    name: Static analysis, security scan, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff static analysis
        run: |
          ruff check .

      - name: Run Pylint code quality analysis
        run: |
          pylint app tests

      - name: Run Bandit security analysis
        run: |
          bandit -r app

      - name: Run automated tests
        run: |
          pytest -v